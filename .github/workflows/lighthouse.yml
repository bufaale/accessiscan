name: Lighthouse CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run Lighthouse CI against production
        # Targets the deployed prod URL listed in lighthouserc.json. Fails the
        # job when any of perf/a11y/best-practices/SEO drop below the budgets.
        run: npx lhci autorun --config=./lighthouserc.json
        continue-on-error: false

      - name: Upload Lighthouse reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 14
